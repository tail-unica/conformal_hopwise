show_progress: True
show_configuration: True
verbose: True
show_split_data: all
eval_step: 100
epochs: 100

metrics: ['ndcg','mrr','recall', 'unwantedrecall'] 

topk: [30]
valid_metric: 'recall@30'

user_inter_num_interval: [5,100000000]
item_inter_num_interval: [5,100000000]

data_path: hopwise/dataset_example
dataset_save_path: saved_dataset/            # (str) The path of saved dataset.
dataloaders_save_path: saved_dataloaders/        # (str) The path of saved dataloaders.
checkpoint_dir: checkpoints/         # (str) The path to save checkpoint file.

# mixed precision training
enable_amp: True
enable_scaler: True

load_col:
    inter: [user_id, item_id, timestamp]
    unwanted: [user_id, item_id, timestamp]

additional_feat_suffix: unwanted


# evaluation arguments
eval_args:                      # (dict) 4 keys: group_by, order, split, and mode
  split: {'LS': 'valid_calib_and_test'} #{'RS': [0.7, 0.1, 0.1, 0.1]}   # (dict) The splitting strategy ranging in ['RS','LS'].
  group_by: user                # (str) The grouping strategy ranging in ['user', 'none'].
  order: TO                     # (str) The ordering strategy ranging in ['RO', 'TO'].
  mode: {"valid": "full", "calib": "full", "test": "full"} # (str) The evaluation mode ranging in ['full','unixxx','popxxx','labeled'].



# Calibrating unwanted recommendations
calibration:
  calibrator: ConformalRiskControl 
  alpha: 0.05 # 1 - confidence level (e.g., 0.80 means we want to control the risk at 20%)
  maximum_metric_score: 1.0 # maximum possible value of the metric (e.g., 1.0 for novelty, 1 for recall, etc..)
  n_lambdas: 3000 # the number of lambda thresholds to consider when calibrating the model (e.g., 50000 means we will consider 50000 different lambda thresholds between 0 and the maximum possible metric score when calibrating the model)
  loss: Unwanted # should the class name of the loss to use for calibration (e.g., Miscoverage, unwanted..) present in hopwise.evaluator.conformal.metrics.py
  
  # EXPECTATION CHECK
  prove_expectation: False
  n_calibration_users: 0.4 # the proportion of users to use for calibration (the rest will be used for testing)
  n_trials: 500 # to verify the expectation of the conformal risk control
